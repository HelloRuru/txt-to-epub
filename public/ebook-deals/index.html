  <style>
    /* =============================================
       DS 文青 V0.2（Behance 等級）
       鼠尾草綠 + 源雲明朝 + 暖棕多層陰影 + 紙質感
       ============================================= */

    /* --- Fonts --- */
    @font-face {
      font-family: 'GenSenRounded';
      src: url('https://lab.helloruru.com/fonts/GenSenRounded-Regular.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'GenSenRounded';
      src: url('https://lab.helloruru.com/fonts/GenSenRounded-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    @font-face {
      font-family: 'GenSenRounded';
      src: url('https://lab.helloruru.com/fonts/GenSenRounded-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'GenWanMin2TC';
      src: url('https://lab.helloruru.com/fonts/GenWanMin2TC-Regular.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'GenWanMin2TC';
      src: url('https://lab.helloruru.com/fonts/GenWanMin2TC-SemiBold.woff2') format('woff2');
      font-weight: 600; font-display: swap;
    }

    /* --- Variables --- */
    :root {
      --color-sage: #A8B5A0;
      --color-sage-dark: #889B7E;
      --color-sage-light: #C5CFBF;
      --color-sage-bg: rgba(168, 181, 160, 0.10);
      --color-gold: #C2B280;
      --color-gold-dark: #A89860;
      --color-gold-bg: rgba(194, 178, 128, 0.12);
      --color-ink: #5C4A3A;
      --color-lavender: #AEA8B8;
      --color-lavender-bg: rgba(174, 168, 184, 0.10);

      --text-primary: #3D3833;
      --text-secondary: #5C5650;
      --text-muted: #8A847E;
      --text-hint: #B0A99F;

      --bg-page: #F7F5F2;
      --bg-card: #FFFFFF;
      --bg-card-warm: #FFFDF8;
      --bg-card-hover: #FBF8F4;
      --border-color: #E5E0DB;

      /* Josh Comeau 多層陰影 — 暖棕色調 */
      --shadow-sm:
        0 1px 1px hsl(35deg 30% 30% / 0.06),
        0 2px 2px hsl(35deg 30% 30% / 0.06),
        0 4px 4px hsl(35deg 30% 30% / 0.06);
      --shadow-md:
        0 1px 1px hsl(35deg 30% 30% / 0.05),
        0 2px 2px hsl(35deg 30% 30% / 0.05),
        0 4px 4px hsl(35deg 30% 30% / 0.05),
        0 8px 8px hsl(35deg 30% 30% / 0.05),
        0 16px 16px hsl(35deg 30% 30% / 0.05);
      --shadow-lg:
        0 2px 2px hsl(35deg 30% 30% / 0.04),
        0 4px 4px hsl(35deg 30% 30% / 0.04),
        0 8px 8px hsl(35deg 30% 30% / 0.04),
        0 16px 16px hsl(35deg 30% 30% / 0.04),
        0 32px 32px hsl(35deg 30% 30% / 0.04);

      --gradient-primary: linear-gradient(135deg, #A8B5A0, #AEA8B8);

      --font-serif: 'GenWanMin2TC', 'Noto Serif TC', serif;
      --font-body: 'GenSenRounded', 'Noto Sans TC', sans-serif;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 24px;

      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
    }

    /* --- 深色模式：深夜書房 --- */
    html.dark {
      --color-sage: #B8C4AE;
      --color-sage-dark: #95A88C;
      --color-sage-bg: rgba(184, 196, 174, 0.12);
      --color-gold: #D4C490;
      --color-gold-dark: #B8A870;
      --color-gold-bg: rgba(212, 196, 144, 0.12);
      --color-ink: #D4C8BC;
      --color-lavender: #C0BACC;
      --color-lavender-bg: rgba(192, 186, 204, 0.10);

      --text-primary: #E8E0D4;
      --text-secondary: #C4B8A8;
      --text-muted: #8A7E72;
      --text-hint: #6B665F;

      --bg-page: #1C1614;
      --bg-card: #252019;
      --bg-card-warm: #2A231C;
      --bg-card-hover: #332B22;
      --border-color: #3D3428;

      --shadow-sm:
        0 1px 2px rgba(0,0,0,0.2),
        0 2px 4px rgba(0,0,0,0.15);
      --shadow-md:
        0 2px 4px rgba(0,0,0,0.2),
        0 4px 8px rgba(0,0,0,0.15),
        0 8px 16px rgba(0,0,0,0.1);
      --shadow-lg:
        0 4px 8px rgba(0,0,0,0.2),
        0 8px 16px rgba(0,0,0,0.15),
        0 16px 32px rgba(0,0,0,0.1),
        0 32px 64px rgba(0,0,0,0.05);

      --gradient-primary: linear-gradient(135deg, #B8C4AE, #8BBCB0);
    }

    /* --- Reset & Base --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 16px;
      line-height: 1.8;
      color: var(--text-secondary);
      background: var(--bg-page);
      -webkit-font-smoothing: antialiased;
    }

    /* --- Typography --- */
    h1, h2, h3 {
      font-family: var(--font-serif);
      color: var(--color-ink);
      letter-spacing: 0.02em;
      line-height: 1.4;
    }
    h1 { font-size: 32px; font-weight: 600; }
    h2 { font-size: 22px; font-weight: 600; }
    h3 { font-size: 18px; font-weight: 400; }

    a {
      color: var(--color-sage);
      text-decoration: none;
      background-image: linear-gradient(var(--color-sage), var(--color-sage));
      background-size: 0% 1px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: background-size 0.3s ease, color var(--transition-fast);
    }
    a:hover {
      color: var(--color-sage-dark);
      background-size: 100% 1px;
    }

    /* --- Layout --- */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    /* --- Hero --- */
    .hero {
      text-align: center;
      padding: 40px 0 32px;
    }
    .accent-bar {
      width: 60px;
      height: 4px;
      border-radius: 2px;
      background: var(--gradient-primary);
      margin: 0 auto 20px;
    }
    .hero h1 { margin-bottom: 8px; }
    .hero-sub {
      font-family: var(--font-serif);
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .hero-updated {
      font-size: 12px;
      color: var(--text-hint);
      margin-top: 8px;
    }
    .refresh-btn {
      background: none;
      border: 1px solid var(--border-color);
      border-radius: 999px;
      padding: 2px 10px;
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition-fast);
      margin-left: 4px;
    }
    .refresh-btn:hover {
      border-color: var(--color-sage);
      color: var(--color-sage-dark);
    }
    .refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* --- Platform Tabs --- */
    .platform-tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 8px 20px;
      border: 1px solid var(--border-color);
      border-radius: 999px;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-normal);
    }
    .tab:hover {
      border-color: var(--color-sage);
      color: var(--text-primary);
    }
    .tab.active {
      background: var(--color-sage);
      color: #fff;
      border-color: var(--color-sage);
    }

    /* --- Three-Column Layout --- */
    .platform-columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .platform-column {
      min-width: 0;
    }
    .column-header {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 600;
      color: var(--color-ink);
      text-align: center;
      padding: 10px 0;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }
    .column-header .col-count {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 400;
      color: var(--text-hint);
      margin-left: 4px;
    }
    .deals-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* --- Deal Card (Vertical for columns) --- */
    .deal-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 20px 16px;
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition-normal),
                  box-shadow var(--transition-normal),
                  background var(--transition-normal);
    }
    @media (hover: hover) {
      .deal-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-md);
        background: var(--bg-card-hover);
      }
    }

    /* --- Book Cover --- */
    .book-cover-wrap {
      flex-shrink: 0;
      perspective: 800px;
    }
    .book-cover {
      width: 120px;
      height: 180px;
      border-radius: 2px 6px 6px 2px;
      overflow: hidden;
      position: relative;
      box-shadow:
        3px 1px 4px rgba(92, 74, 58, 0.15),
        6px 4px 12px rgba(92, 74, 58, 0.1),
        1px 1px 2px rgba(92, 74, 58, 0.12);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }
    html.dark .book-cover {
      box-shadow:
        3px 1px 4px rgba(0,0,0,0.3),
        6px 4px 12px rgba(0,0,0,0.2),
        1px 1px 2px rgba(0,0,0,0.25);
    }
    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* 書脊陰影 */
    .book-cover::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(90deg, rgba(0,0,0,0.12), transparent);
      z-index: 1;
    }
    /* 光澤滑過 */
    .book-cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(255,255,255,0.12) 45%,
        rgba(255,255,255,0.04) 50%,
        transparent 55%
      );
      transform: translateX(-100%);
      transition: transform 0.6s ease;
      z-index: 2;
    }
    @media (hover: hover) {
      .deal-card:hover .book-cover::after {
        transform: translateX(100%);
      }
      .deal-card:hover .book-cover {
        transform: translateY(-2px);
        box-shadow:
          4px 2px 6px rgba(92, 74, 58, 0.18),
          8px 6px 16px rgba(92, 74, 58, 0.12);
      }
    }

    /* Cover placeholder */
    .book-cover-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #E5E0DB 0%, #D8CFC4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      font-family: var(--font-serif);
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.4;
    }
    html.dark .book-cover-placeholder {
      background: linear-gradient(135deg, #3D3428 0%, #332B22 100%);
    }

    /* --- Deal Info --- */
    .deal-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .deal-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .platform-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 999px;
      border: 1px solid;
      letter-spacing: 0.02em;
    }
    .platform-badge.readmoo {
      color: #0098CC;
      border-color: rgba(0, 152, 204, 0.3);
      background: rgba(0, 152, 204, 0.06);
    }
    .platform-badge.books {
      color: #5A7A94;
      border-color: rgba(90, 122, 148, 0.3);
      background: rgba(90, 122, 148, 0.06);
    }
    .platform-badge.kobo {
      color: #B04040;
      border-color: rgba(176, 64, 64, 0.3);
      background: rgba(176, 64, 64, 0.06);
    }
    .deal-date {
      font-size: 12px;
      color: var(--text-hint);
    }
    .deal-type {
      font-size: 11px;
      color: var(--text-hint);
      border: 1px solid var(--border-color);
      padding: 1px 8px;
      border-radius: 999px;
    }
    .deal-title {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 600;
      color: var(--color-ink);
      line-height: 1.4;
      margin-bottom: 4px;
      letter-spacing: 0.01em;
    }
    .deal-author {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* --- Pricing --- */
    .deal-pricing {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .price-deal {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-gold);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .price-original {
      font-size: 14px;
      color: var(--text-hint);
      text-decoration: line-through;
      font-variant-numeric: tabular-nums;
    }
    .price-discount {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-sage);
      background: var(--color-sage-bg);
      padding: 2px 8px;
      border-radius: 999px;
    }

    /* --- Recommendation --- */
    .deal-rec {
      margin-bottom: 10px;
      min-height: 22px;
    }
    .rec-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid;
    }
    .rec-badge.must-buy {
      color: var(--color-sage-dark);
      border-color: rgba(168, 181, 160, 0.4);
      background: var(--color-sage-bg);
    }
    html.dark .rec-badge.must-buy { color: var(--color-sage); }
    .rec-badge.great-deal {
      color: var(--color-gold-dark);
      border-color: rgba(194, 178, 128, 0.4);
      background: var(--color-gold-bg);
    }
    html.dark .rec-badge.great-deal { color: var(--color-gold); }
    .rec-badge.worth-it {
      color: var(--color-lavender);
      border-color: rgba(174, 168, 184, 0.3);
      background: var(--color-lavender-bg);
    }
    .rec-badge.just-looking {
      color: var(--text-muted);
      border-color: var(--border-color);
      background: transparent;
    }
    .rec-copy {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.6;
    }

    /* --- Deal Link --- */
    .deal-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-sage);
      background-image: none;
      transition: color var(--transition-fast), gap var(--transition-fast);
    }
    .deal-link:hover {
      color: var(--color-sage-dark);
      gap: 8px;
    }
    .deal-link svg {
      width: 14px; height: 14px;
    }

    /* --- Gold Divider --- */
    .divider-gold {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
      margin: 48px auto;
      opacity: 0.5;
    }

    /* --- Search Section --- */
    .search-section { text-align: center; }
    .search-section h2 { margin-bottom: 4px; }
    .section-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .search-box {
      display: flex;
      gap: 8px;
      max-width: 500px;
      margin: 0 auto 24px;
    }
    .input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-card);
      color: var(--text-primary);
      border: 2px solid var(--border-color);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 500;
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .input:focus {
      border-color: var(--color-sage);
      box-shadow: 0 0 0 3px rgba(168, 181, 160, 0.15);
    }
    .input::placeholder { color: var(--text-hint); }
    .btn-sage {
      padding: 12px 24px;
      background: var(--color-sage);
      color: #fff;
      border: none;
      border-radius: var(--radius-lg);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-normal);
      white-space: nowrap;
    }
    .btn-sage:hover {
      background: var(--color-sage-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }
    .btn-sage:active { transform: scale(0.97); }

    /* --- Search Results --- */
    .search-results { text-align: left; }
    .search-result-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--border-color);
      background: var(--bg-card);
      margin-bottom: 6px;
      font-size: 14px;
      transition: background var(--transition-fast);
      background-image: none;
    }
    .search-result-card:hover { background: var(--bg-card-hover); }
    .search-result-card.readmoo { border-left-color: #0098CC; }
    .search-result-card.books { border-left-color: #5A7A94; }
    .search-result-card.kobo { border-left-color: #B04040; }
    .result-title {
      flex: 1;
      font-family: var(--font-serif);
      font-weight: 400;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-price {
      font-weight: 700;
      color: var(--color-gold);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .result-platform {
      font-size: 11px;
      color: var(--text-hint);
      flex-shrink: 0;
    }

    /* --- Upcoming Section --- */
    .upcoming-section h2 { text-align: center; margin-bottom: 4px; }
    .upcoming-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }
    .upcoming-card {
      background: var(--bg-card-warm);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
      position: relative;
      transition: all var(--transition-normal);
    }
    /* Dog-ear 摺角 */
    .upcoming-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 20px; height: 20px;
      background: linear-gradient(225deg, var(--bg-page) 50%, #EDE9E4 50%, #E5E0DB 60%, var(--bg-card-warm) 60%);
      border-radius: 0 var(--radius-md) 0 0;
    }
    html.dark .upcoming-card::before {
      background: linear-gradient(225deg, var(--bg-page) 50%, #2E2820 50%, #383028 60%, var(--bg-card-warm) 60%);
    }
    /* 書脊線 */
    .upcoming-card::after {
      content: '';
      position: absolute;
      top: 10px; bottom: 10px; left: 12px;
      width: 2px;
      background: var(--color-sage);
      opacity: 0.12;
      border-radius: 1px;
    }
    @media (hover: hover) {
      .upcoming-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-sm);
      }
    }
    .upcoming-date {
      font-size: 12px;
      color: var(--text-hint);
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }
    .upcoming-title {
      font-family: var(--font-serif);
      font-size: 14px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .upcoming-price {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-gold);
      margin-top: 6px;
    }

    /* --- Loading Shimmer --- */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .shimmer-card {
      display: flex;
      gap: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
    }
    .shimmer-block {
      background: linear-gradient(90deg, var(--border-color) 25%, var(--bg-page) 50%, var(--border-color) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    .shimmer-cover { width: 100px; height: 150px; flex-shrink: 0; border-radius: 2px 6px 6px 2px; }
    .shimmer-content { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .shimmer-title { height: 22px; width: 70%; }
    .shimmer-text { height: 16px; width: 45%; }
    .shimmer-price { height: 28px; width: 30%; }

    /* --- Exhibitions --- */
    .exhibitions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .exhibition-card {
      display: block;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition-normal), box-shadow var(--transition-normal);
    }
    @media (hover: hover) {
      .exhibition-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-md);
      }
    }
    .exhibition-banner {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      background: var(--bg-card-warm);
    }
    .exhibition-info {
      padding: 12px 16px;
    }
    .exhibition-title {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .exhibition-source {
      font-size: 12px;
      color: var(--text-hint);
      margin-top: 4px;
    }
    .exhibition-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-sage-bg);
      color: var(--color-sage);
      font-family: var(--font-serif);
      font-size: 18px;
    }

    /* --- Footer --- */
    .site-footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 14px;
      color: var(--text-hint);
      position: relative;
    }
    .site-footer::before {
      content: '';
      display: block;
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
      margin: 0 auto 24px;
      opacity: 0.5;
    }
    .site-footer a { color: var(--color-sage); }
    .credits {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-hint);
    }

    /* --- Theme Toggle --- */
    .theme-toggle {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 44px; height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-color);
      border-radius: 50%;
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      z-index: 200;
      transition: all var(--transition-normal);
    }
    .theme-toggle:hover {
      background: var(--color-sage-bg);
      border-color: var(--color-sage);
      color: var(--color-sage-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .theme-toggle svg { width: 20px; height: 20px; }

    /* --- Status Messages --- */
    .status-msg {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 14px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background: var(--bg-card);
    }
    .status-msg.error {
      color: #C9928A;
      border-color: rgba(201, 146, 138, 0.3);
      background: rgba(201, 146, 138, 0.06);
    }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty-state p {
      font-family: var(--font-serif);
      font-size: 16px;
    }

    /* --- Responsive --- */
    @media (max-width: 1023px) {
      .platform-columns { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      h1 { font-size: 26px; }
      h2 { font-size: 20px; }
      .hero { padding: 28px 0 24px; }
      .container { padding: 0 16px 48px; }
      .platform-columns { grid-template-columns: 1fr; }
      .deal-card { padding: 14px; gap: 12px; }
      .book-cover { width: 100px; height: 150px; }
      .deal-title { font-size: 15px; }
      .price-deal { font-size: 20px; }
      .search-box { flex-direction: column; }
      .upcoming-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }

    /* --- Accessibility --- */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* --- Scrollbar --- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-hint); }
  </style>
</head>
<body>
  <hello-ruru-header title="每日好書推薦"></hello-ruru-header>

  <main class="container">
    <section class="hero">
      <div class="accent-bar"></div>
      <h1>每日好書推薦</h1>
      <p class="hero-sub">Readmoo・博客來・Kobo — 今天又有哪些書在特價？</p>
      <p class="hero-updated"><span id="updated-at"></span> <button id="refresh-btn" class="refresh-btn" title="重新抓取最新資料" style="display:none">重新整理</button></p>
    </section>

    <section id="deals-section">
      <div class="platform-columns" id="platform-columns">
        <div class="platform-column">
          <div class="column-header">Readmoo</div>
          <div class="deals-grid" id="grid-readmoo">
            <div class="shimmer-card"><div class="shimmer-block shimmer-cover"></div><div class="shimmer-content"><div class="shimmer-block shimmer-title"></div><div class="shimmer-block shimmer-price"></div></div></div>
          </div>
        </div>
        <div class="platform-column">
          <div class="column-header">博客來</div>
          <div class="deals-grid" id="grid-books">
            <div class="shimmer-card"><div class="shimmer-block shimmer-cover"></div><div class="shimmer-content"><div class="shimmer-block shimmer-title"></div><div class="shimmer-block shimmer-price"></div></div></div>
          </div>
        </div>
        <div class="platform-column">
          <div class="column-header">Kobo</div>
          <div class="deals-grid" id="grid-kobo">
            <div class="shimmer-card"><div class="shimmer-block shimmer-cover"></div><div class="shimmer-content"><div class="shimmer-block shimmer-title"></div><div class="shimmer-block shimmer-price"></div></div></div>
          </div>
        </div>
      </div>
    </section>

    <div class="divider-gold"></div>

    <section class="search-section">
      <h2>搜尋比價</h2>
      <p class="section-desc">輸入書名，看看哪個平台最便宜</p>
      <div class="search-box">
        <input type="text" id="search-input" class="input" placeholder="搜尋書名或作者...">
        <button id="search-btn" class="btn-sage">搜尋</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </section>

    <section id="upcoming-section" class="upcoming-section" style="display:none">
      <div class="divider-gold"></div>
      <h2>即將登場</h2>
      <p class="section-desc" style="text-align:center">Readmoo 未來幾天的特價預告</p>
      <div id="upcoming-grid" class="upcoming-grid"></div>
    </section>

    <section id="exhibitions-section" style="display:none">
      <div class="divider-gold"></div>
      <h2>書展活動</h2>
      <p class="section-desc" style="text-align:center">博客來・Readmoo 電子書展覽與促銷活動</p>
      <div id="exhibitions-grid" class="exhibitions-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Kaoru Tsai. All Rights Reserved. | Contact: <a href="mailto:hello@helloruru.com">hello@helloruru.com</a></p>
    <p class="credits">資料來源：Readmoo・博客來・<a href="https://t.me/kobo_99_notifier" target="_blank" rel="noopener">kobo_99_notifier</a> | 評分：Google Books</p>
  </footer>

  <button id="theme-toggle" class="theme-toggle" aria-label="切換深色模式">
    <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <script>
    // === Config ===
    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:8787'
      : 'https://ebook-deals.vmpvmp1017.workers.dev';

    // === Helpers ===
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    // === Dark Mode ===
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
        updateThemeIcon(true);
      }
    })();
    function updateThemeIcon(isDark) {
      document.getElementById('icon-sun').style.display = isDark ? 'none' : 'block';
      document.getElementById('icon-moon').style.display = isDark ? 'block' : 'none';
    }
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeIcon(isDark);
    });

    // === State ===
    let allDealsData = null;

    // === Fetch Deals ===
    async function fetchDeals(endpoint = '/api/deals') {
      try {
        const res = await fetch(API_BASE + endpoint);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        allDealsData = data;
        if (data.updatedAt) {
          const d = new Date(data.updatedAt);
          document.getElementById('updated-at').textContent =
            '\u6700\u5F8C\u66F4\u65B0\uFF1A' + d.toLocaleDateString('zh-TW') + ' ' +
            d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
        }
        document.getElementById('refresh-btn').style.display = '';
        renderDeals(data);
        renderExhibitions(data.exhibitions);
      } catch (err) {
        document.getElementById('grid-readmoo').innerHTML =
          '<div class="status-msg error">\u8F09\u5165\u5931\u6557\uFF1A' + escapeHtml(err.message) + '</div>';
      }
    }

    // === Refresh Button ===
    document.getElementById('refresh-btn').addEventListener('click', async () => {
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.textContent = '\u6293\u53D6\u4E2D...';
      for (const p of ['readmoo','books','kobo']) {
        document.getElementById('grid-' + p).innerHTML =
          '<div class="shimmer-card"><div class="shimmer-block shimmer-cover"></div><div class="shimmer-content"><div class="shimmer-block shimmer-title"></div><div class="shimmer-block shimmer-price"></div></div></div>';
      }
      await fetchDeals('/api/refresh');
      btn.disabled = false;
      btn.textContent = '\u91CD\u65B0\u6574\u7406';
    });

    // === Render Deals ===
    function renderDeals(data) {
      // 用本地時間（台灣 UTC+8），不用 UTC，否則凌晨會差一天
      const now = new Date();
      const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
      const upcomingDeals = [];

      for (const platform of ['readmoo', 'books', 'kobo']) {
        const deals = data[platform]?.deals || [];
        const todayDeals = [];

        for (const deal of deals) {
          if (platform === 'readmoo') {
            if (deal.date === today) todayDeals.push(deal);
            else if (deal.date > today) upcomingDeals.push(deal);
          } else {
            todayDeals.push(deal);
          }
        }

        const grid = document.getElementById('grid-' + platform);
        const header = grid.previousElementSibling;
        if (todayDeals.length === 0) {
          grid.innerHTML = '<div class="empty-state"><p>\u4ECA\u5929\u7121\u7279\u50F9</p></div>';
        } else {
          header.innerHTML = header.textContent.split('<')[0] + '<span class="col-count">' + todayDeals.length + ' \u672C</span>';
          grid.innerHTML = todayDeals.map(deal => renderDealCard(deal)).join('');
          grid.querySelectorAll('.deal-rec[data-title]').forEach(el => loadRating(el));
        }
      }

      if (upcomingDeals.length > 0) {
        document.getElementById('upcoming-section').style.display = '';
        document.getElementById('upcoming-grid').innerHTML =
          upcomingDeals.sort((a, b) => a.date.localeCompare(b.date))
            .map(d => renderUpcomingCard(d)).join('');
      }
    }

    function renderDealCard(deal) {
      const p = deal.platform || '';
      const pName = deal.platformName || deal.platform;
      const disc = deal.originalPrice > 0
        ? Math.round((1 - deal.dealPrice / deal.originalPrice) * 100) : 0;

      const cover = deal.coverUrl
        ? '<img src="' + escapeHtml(deal.coverUrl) + '" alt="' + escapeHtml(deal.title) + '" loading="lazy" onerror="this.outerHTML=\'<div class=book-cover-placeholder>' + escapeHtml(deal.title.slice(0, 8)) + '</div>\'">'
        : '<div class="book-cover-placeholder">' + escapeHtml(deal.title.slice(0, 8)) + '</div>';

      return '<article class="deal-card" data-platform="' + p + '">' +
        '<div class="book-cover-wrap"><div class="book-cover">' + cover + '</div></div>' +
        '<div class="deal-info">' +
          '<div class="deal-meta">' +
            (deal.dealType ? '<span class="deal-type">' + escapeHtml(deal.dealType) + '</span>' : '') +
            '<span class="deal-date">' + formatDate(deal.date) + '</span>' +
          '</div>' +
          '<h3 class="deal-title">' + escapeHtml(deal.title) + '</h3>' +
          (deal.author ? '<p class="deal-author">' + escapeHtml(deal.author) + '</p>' : '') +
          '<div class="deal-pricing">' +
            '<span class="price-deal">$' + deal.dealPrice + '</span>' +
            (deal.originalPrice > 0 ? '<span class="price-original">$' + deal.originalPrice + '</span>' : '') +
            (disc > 0 ? '<span class="price-discount">\u7701 ' + disc + '%</span>' : '') +
          '</div>' +
          '<div class="deal-rec" data-title="' + escapeHtml(deal.title) + '" data-author="' + escapeHtml(deal.author || '') + '" data-deal="' + deal.dealPrice + '" data-original="' + (deal.originalPrice || 0) + '"></div>' +
          '<a href="' + escapeHtml(deal.bookUrl) + '" class="deal-link" target="_blank" rel="noopener">' +
            '\u524D\u5F80\u8CFC\u8CB7 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>' +
          '</a>' +
        '</div></article>';
    }

    function renderUpcomingCard(deal) {
      return '<div class="upcoming-card">' +
        '<p class="upcoming-date">' + formatDate(deal.date) + '</p>' +
        '<p class="upcoming-title">' + escapeHtml(deal.title) + '</p>' +
        '<p class="upcoming-price">$' + deal.dealPrice + '</p>' +
      '</div>';
    }

    // === Load Rating (Async) ===
    async function loadRating(el) {
      try {
        const params = new URLSearchParams({
          title: el.dataset.title,
          author: el.dataset.author || '',
          dealPrice: el.dataset.deal,
          originalPrice: el.dataset.original,
        });
        const res = await fetch(API_BASE + '/api/rating?' + params);
        if (!res.ok) return;
        const data = await res.json();
        if (!data.success || !data.recommendation) return;
        const rec = data.recommendation;
        el.innerHTML =
          '<span class="rec-badge ' + (rec.level || 'just-looking') + '">' +
            escapeHtml(rec.label) +
            (rec.stats ? ' \u00B7 ' + escapeHtml(rec.stats) : '') +
          '</span>' +
          '<p class="rec-copy">' + escapeHtml(rec.copy) + '</p>';
      } catch {}
    }

    // === Exhibitions ===
    function renderExhibitions(exData) {
      if (!exData || !exData.exhibitions || exData.exhibitions.length === 0) return;
      document.getElementById('exhibitions-section').style.display = '';
      const sources = { books: '博客來', readmoo: 'Readmoo' };
      document.getElementById('exhibitions-grid').innerHTML =
        exData.exhibitions.slice(0, 12).map(ex => {
          const banner = ex.bannerUrl
            ? '<img class="exhibition-banner" src="' + escapeHtml(ex.bannerUrl) + '" alt="' + escapeHtml(ex.title) + '" loading="lazy" onerror="this.outerHTML=\'<div class=exhibition-placeholder>書展</div>\'">'
            : '<div class="exhibition-placeholder">書展</div>';
          return '<a href="' + escapeHtml(ex.url) + '" class="exhibition-card" target="_blank" rel="noopener">' +
            banner +
            '<div class="exhibition-info">' +
              '<p class="exhibition-title">' + escapeHtml(ex.title) + '</p>' +
              '<p class="exhibition-source">' + (sources[ex.source] || ex.source) + '</p>' +
            '</div></a>';
        }).join('');
    }

    // === Search ===
    document.getElementById('search-btn').addEventListener('click', doSearch);
    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
      const query = document.getElementById('search-input').value.trim();
      if (!query) return;
      const sr = document.getElementById('search-results');
      sr.innerHTML = '<div class="status-msg">\u641C\u5C0B\u4E2D...</div>';
      try {
        const res = await fetch(API_BASE + '/api/search?q=' + encodeURIComponent(query));
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const platforms = ['readmoo', 'books', 'kobo'];
        const names = { readmoo: 'Readmoo', books: '\u535A\u5BA2\u4F86', kobo: 'Kobo' };
        let all = [];
        for (const p of platforms) {
          const results = data[p]?.results || [];
          all.push(...results.map(r => ({ ...r, platform: p })));
        }
        if (all.length === 0) {
          sr.innerHTML = '<div class="status-msg">\u6C92\u6709\u627E\u5230\u76F8\u95DC\u66F8\u7C4D</div>';
          return;
        }
        sr.innerHTML = all.map(r =>
          '<a href="' + escapeHtml(r.url || r.bookUrl || '#') + '" class="search-result-card ' + r.platform + '" target="_blank" rel="noopener">' +
            '<span class="result-title">' + escapeHtml(r.title) + '</span>' +
            '<span class="result-price">' + (r.price ? '$' + r.price : '') + '</span>' +
            '<span class="result-platform">' + (names[r.platform] || r.platform) + '</span>' +
          '</a>'
        ).join('');
      } catch (err) {
        sr.innerHTML = '<div class="status-msg error">\u641C\u5C0B\u5931\u6557\uFF1A' + escapeHtml(err.message) + '</div>';
      }
    }

    // === Init ===
    fetchDeals();
  </script>
</body>
</html>
