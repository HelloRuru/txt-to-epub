<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電子書每日好康 — 三平台特價一覽 | HelloRuru</title>
  <meta name="description" content="Readmoo、博客來、Kobo 電子書每日特價一覽，搜尋比價找最便宜的電子書。">
  <meta property="og:title" content="電子書每日好康 — 三平台特價一覽">
  <meta property="og:description" content="Readmoo、博客來、Kobo 電子書每日特價，一頁看完今天所有好康！">
  <meta property="og:type" content="website">

  <!-- Fonts -->
  <link rel="preconnect" href="https://lab.helloruru.com" crossorigin>
  <link rel="preload" href="https://lab.helloruru.com/fonts/GenSenRounded-Medium.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="https://lab.helloruru.com/fonts/GenSenRounded-Bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Brand Header -->
  <script src="https://lab.helloruru.com/shared/brand-header.js"></script>

  <style>
    @font-face {
      font-family: 'GenSenRounded';
      src: url('https://lab.helloruru.com/fonts/GenSenRounded-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'GenSenRounded';
      src: url('https://lab.helloruru.com/fonts/GenSenRounded-Medium.woff2') format('woff2');
      font-weight: 500;
      font-display: swap;
    }
    @font-face {
      font-family: 'GenSenRounded';
      src: url('https://lab.helloruru.com/fonts/GenSenRounded-Bold.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }

    /* === Reset & Base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* DS 2.0 Classic — 色彩 */
      --color-primary: #D4A5A5;
      --color-secondary: #B8A9C9;
      --c-coral: #E8A87C;
      --c-gray-rose: #C9929A;
      --c-hint: #AAAAAA;
      --gradient-primary: linear-gradient(135deg, #D4A5A5, #B8A9C9);
      --color-bg: #FAFAFA;
      --color-card: #FFFFFF;
      --color-card-hover: #FDF8F7;
      --color-title: #333333;
      --color-body: #4A4A4A;
      --color-muted: #888888;
      --color-border: #E8E4E1;

      /* DS 2.0 Classic — 多層柔陰影（Josh Comeau） */
      --shadow-sm: 0 1px 2px rgba(212,165,165,0.07), 0 2px 4px rgba(212,165,165,0.07), 0 4px 8px rgba(212,165,165,0.07);
      --shadow: 0 2px 4px rgba(212,165,165,0.07), 0 4px 8px rgba(212,165,165,0.07), 0 8px 16px rgba(212,165,165,0.07), 0 16px 32px rgba(212,165,165,0.05);
      --shadow-lg: 0 4px 8px rgba(212,165,165,0.07), 0 8px 16px rgba(212,165,165,0.07), 0 16px 32px rgba(212,165,165,0.07), 0 32px 64px rgba(212,165,165,0.05);

      --radius-card: 24px;
      --radius-input: 12px;
      --radius-tag: 8px;

      /* 平台色 */
      --readmoo-color: #2d6bb4;
      --books-color: #4a7c59;
      --kobo-color: #bf2026;
    }

    /* 深色模式 — 暖可可 */
    html.dark {
      --color-bg: #1E181B;
      --color-card: #282224;
      --color-card-hover: #302A2C;
      --color-title: #EDE8E9;
      --color-body: #C8C0C2;
      --color-muted: #9E9496;
      --color-border: #3D3538;
      --color-primary: #DAAEB0;
      --color-secondary: #C2B4D0;
      --c-coral: #F0B88C;
      --c-gray-rose: #D4A0A4;
      --c-hint: #6B6466;
      --gradient-primary: linear-gradient(135deg, #DAAEB0, #C2B4D0);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.12), 0 4px 8px rgba(0,0,0,0.12);
      --shadow: 0 2px 4px rgba(0,0,0,0.15), 0 4px 8px rgba(0,0,0,0.12), 0 8px 16px rgba(0,0,0,0.1), 0 16px 32px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 8px rgba(0,0,0,0.15), 0 8px 16px rgba(0,0,0,0.12), 0 16px 32px rgba(0,0,0,0.1), 0 32px 64px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'GenSenRounded', 'Noto Sans TC', sans-serif;
      font-weight: 500;
      color: var(--color-body);
      background: var(--color-bg);
      line-height: 1.8;
      font-size: 16px;
      min-height: 100vh;
    }

    a {
      color: var(--color-primary);
      text-decoration: none;
      background-image: linear-gradient(var(--color-primary), var(--color-primary));
      background-size: 0% 1px;
      background-position: left bottom;
      background-repeat: no-repeat;
      transition: background-size 0.25s ease;
    }
    @media (hover: hover) {
      a:hover { background-size: 100% 1px; }
    }

    /* 無障礙：減少動態 */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* === Layout === */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* === Hero === */
    .hero {
      text-align: center;
      padding: 48px 24px 32px;
    }
    .hero h1 {
      font-size: 40px;
      font-weight: 700;
      color: var(--color-title);
      line-height: 1.3;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    .hero .subtitle {
      font-size: 18px;
      color: var(--color-muted);
      margin-bottom: 24px;
    }
    .hero .update-time {
      font-size: 14px;
      color: var(--color-muted);
    }

    /* === Platform Tabs === */
    .platform-tabs {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .platform-tab {
      padding: 8px 24px;
      border-radius: 24px;
      border: 2px solid var(--color-border);
      background: var(--color-card);
      color: var(--color-body);
      font-family: inherit;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .platform-tab:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }
    .platform-tab.active {
      background: var(--color-gradient);
      color: #FFFFFF;
      border-color: transparent;
    }

    /* === Today's Deals Grid === */
    .deals-section {
      margin-bottom: 48px;
    }
    .section-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-title);
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }
    .section-subtitle {
      text-align: center;
      color: var(--color-muted);
      margin-bottom: 32px;
      font-size: 15px;
    }

    .deals-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 32px;
    }

    /* === Deal Card === */
    .deal-card {
      background: var(--color-card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(212,165,165,0.15);
      overflow: hidden;
      transition: transform 0.18s ease-out, box-shadow 0.18s ease-out, background 0.18s ease-out;
      display: flex;
      flex-direction: column;
    }
    @media (hover: hover) {
      .deal-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow);
        background: var(--color-card-hover);
      }
    }
    html.dark .deal-card {
      border-color: rgba(224,175,175,0.1);
    }

    .card-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: var(--radius-tag);
      font-size: 13px;
      font-weight: 700;
      color: #FFFFFF;
    }
    .platform-badge.readmoo { background: var(--readmoo-color); }
    .platform-badge.books { background: var(--books-color); }
    .platform-badge.kobo { background: var(--kobo-color); }

    .deal-type-tag {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: var(--radius-tag);
      background: transparent;
      border: 1px solid rgba(212,165,165,0.3);
      color: var(--color-primary);
      font-weight: 500;
    }

    .card-body {
      padding: 0 20px 16px;
      flex: 1;
      display: flex;
      gap: 16px;
    }
    .book-cover {
      width: 100px;
      min-width: 100px;
      height: 140px;
      border-radius: var(--radius-tag);
      object-fit: cover;
      background: var(--color-border);
      box-shadow: var(--shadow-soft);
    }
    .book-cover-placeholder {
      width: 100px;
      min-width: 100px;
      height: 140px;
      border-radius: var(--radius-tag);
      background: var(--color-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFFFFF;
      font-size: 14px;
      text-align: center;
      padding: 8px;
    }
    .book-info {
      flex: 1;
      min-width: 0;
    }
    .book-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-title);
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .book-author {
      font-size: 14px;
      color: var(--color-muted);
      margin-bottom: 8px;
    }
    .book-publisher {
      font-size: 13px;
      color: var(--color-muted);
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 8px;
    }
    .price-deal {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-primary);
    }
    .price-original {
      font-size: 15px;
      color: var(--color-muted);
      text-decoration: line-through;
    }
    .price-discount {
      font-size: 13px;
      padding: 2px 8px;
      border-radius: var(--radius-tag);
      background: #D4A5A5;
      color: #FFFFFF;
      font-weight: 700;
    }

    /* === Recommendation Badge === */
    .recommendation {
      margin: 12px 20px 0;
      padding: 10px 14px;
      border-radius: var(--radius-tag);
      background: var(--color-bg);
      border-left: 3px solid var(--color-primary);
    }
    .rec-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .rec-label {
      font-size: 14px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: var(--radius-tag);
      color: #FFFFFF;
    }
    .rec-stats {
      font-size: 12px;
      color: var(--color-muted);
    }
    .rec-copy {
      font-size: 14px;
      color: var(--color-body);
      line-height: 1.6;
    }
    .rec-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
    }
    .rec-stars {
      color: #D4A85A;
      font-size: 14px;
      letter-spacing: 1px;
    }
    .rec-rating-text {
      font-size: 12px;
      color: var(--color-muted);
    }
    .rec-loading {
      font-size: 13px;
      color: var(--color-muted);
      padding: 8px 0;
    }

    .card-footer {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--color-border);
    }
    .buy-btn {
      display: block;
      width: 100%;
      padding: 10px;
      text-align: center;
      border-radius: var(--radius-input);
      font-family: inherit;
      font-weight: 500;
      font-size: 15px;
      color: #FFFFFF;
      border: none;
      cursor: pointer;
      transition: transform 0.18s ease-out, box-shadow 0.18s ease-out;
      box-shadow: 0 2px 8px rgba(212,165,165,0.3);
      background-image: none;
    }
    @media (hover: hover) {
      .buy-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(212,165,165,0.4);
      }
    }
    .buy-btn:active {
      transform: scale(0.97);
      transition-duration: 0.1s;
    }
    .buy-btn.readmoo { background: var(--readmoo-color); }
    .buy-btn.books { background: var(--books-color); }
    .buy-btn.kobo { background: var(--kobo-color); }

    /* === Search Section === */
    .search-section {
      margin-bottom: 48px;
      padding: 32px;
      background: var(--color-card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(212,165,165,0.15);
    }
    html.dark .search-section {
      border-color: rgba(224,175,175,0.1);
    }
    .search-box {
      display: flex;
      gap: 12px;
      max-width: 600px;
      margin: 0 auto 24px;
    }
    .search-input {
      flex: 1;
      padding: 12px 20px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-input);
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      color: var(--color-title);
      background: var(--color-bg);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(184,169,201,0.15);
    }
    html.dark .search-input {
      background: #332C2F;
    }
    .search-input::placeholder {
      color: var(--color-muted);
    }
    .search-btn {
      padding: 12px 28px;
      background: var(--gradient-primary);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-input);
      font-family: inherit;
      font-weight: 500;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.18s ease-out, box-shadow 0.18s ease-out;
      box-shadow: 0 2px 8px rgba(212,165,165,0.3);
      white-space: nowrap;
    }
    @media (hover: hover) {
      .search-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(212,165,165,0.4);
      }
    }
    .search-btn:active {
      transform: scale(0.97);
      transition-duration: 0.1s;
    }
    .search-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* === Search Results === */
    .search-results {
      display: none;
    }
    .search-results.active {
      display: block;
    }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .result-column h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-title);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--color-border);
    }
    .result-item {
      padding: 12px;
      border-radius: var(--radius-tag);
      margin-bottom: 8px;
      transition: background 0.18s ease-out;
    }
    @media (hover: hover) {
      .result-item:hover {
        background: var(--color-card-hover);
      }
    }
    .result-item .result-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-title);
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .result-item .result-price {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-primary);
    }
    .result-item .result-link {
      font-size: 13px;
      color: var(--color-muted);
    }
    .no-results {
      text-align: center;
      color: var(--color-muted);
      padding: 24px;
      font-size: 15px;
    }

    /* === Loading === */
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--color-muted);
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      text-align: center;
      padding: 24px;
      color: #C97070;
      background: rgba(201,112,112,0.1);
      border-radius: var(--radius-tag);
    }

    /* === Future Deals (Readmoo 7 天預覽) === */
    .future-deals {
      margin-bottom: 48px;
    }
    .future-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }
    .future-card {
      background: var(--color-card);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(212,165,165,0.15);
      transition: transform 0.18s ease-out, box-shadow 0.18s ease-out;
    }
    @media (hover: hover) {
      .future-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow);
      }
    }
    html.dark .future-card {
      border-color: rgba(224,175,175,0.1);
    }
    .future-date {
      font-size: 13px;
      color: var(--color-muted);
      margin-bottom: 8px;
    }
    .future-cover {
      width: 80px;
      height: 112px;
      border-radius: var(--radius-tag);
      object-fit: cover;
      margin: 0 auto 8px;
      display: block;
      background: var(--color-border);
    }
    .future-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-title);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .future-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-primary);
      margin-top: 4px;
    }

    /* === Footer === */
    .site-footer {
      text-align: center;
      padding: 32px 24px;
      margin-top: 48px;
      position: relative;
    }
    .site-footer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 1px;
      background: var(--gradient-primary);
      opacity: 0.5;
    }
    .footer-credits {
      font-size: 13px;
      color: var(--color-muted);
      margin-bottom: 8px;
      line-height: 1.6;
    }
    .footer-copy {
      font-size: 14px;
      color: var(--color-muted);
    }
    .footer-copy a {
      color: var(--color-primary);
    }

    /* === Dark Mode Toggle === */
    .theme-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(212,165,165,0.15);
      background: var(--color-card);
      box-shadow: var(--shadow);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: transform 0.18s ease-out, box-shadow 0.18s ease-out;
    }
    @media (hover: hover) {
      .theme-toggle:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
      }
    }
    .theme-toggle:active {
      transform: scale(0.97);
    }
    .theme-toggle svg {
      width: 22px;
      height: 22px;
      stroke: var(--color-title);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* === Responsive === */
    @media (max-width: 1023px) {
      .deals-grid, .results-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 767px) {
      .hero h1 { font-size: 30px; }
      .hero .subtitle { font-size: 16px; }
      .deals-grid {
        grid-template-columns: 1fr;
      }
      .results-grid {
        grid-template-columns: 1fr;
      }
      .search-box {
        flex-direction: column;
      }
      .section-title { font-size: 24px; }
      .future-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
    }
  </style>
</head>
<body>

  <hello-ruru-header title="電子書每日好康"></hello-ruru-header>

  <!-- Hero -->
  <section class="hero">
    <h1>電子書每日好康</h1>
    <p class="subtitle">Readmoo、博客來、Kobo — 三平台特價一頁看完</p>
    <p class="update-time" id="updateTime"></p>
  </section>

  <div class="container">

    <!-- Today's Deals -->
    <section class="deals-section">
      <h2 class="section-title">今日特價</h2>
      <p class="section-subtitle">每天自動更新，不用再一個一個平台跑</p>
      <div id="dealsContainer" class="deals-grid">
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>正在從各平台抓取今日特價...</p>
        </div>
      </div>
    </section>

    <!-- Readmoo 7-Day Preview -->
    <section class="future-deals" id="futureDealSection" style="display:none;">
      <h2 class="section-title">Readmoo 未來特價預覽</h2>
      <p class="section-subtitle">讀墨提前公開未來 7 天的特惠書</p>
      <div id="futureDealsGrid" class="future-grid"></div>
    </section>

    <!-- Search -->
    <section class="search-section">
      <h2 class="section-title">搜尋比價</h2>
      <p class="section-subtitle">輸入書名，比較各平台的電子書價格</p>
      <div class="search-box">
        <input type="text" id="searchInput" class="search-input"
          placeholder="輸入書名或關鍵字..." maxlength="100"
          autocomplete="off">
        <button id="searchBtn" class="search-btn" onclick="doSearch()">搜尋比價</button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </section>

  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <p class="footer-credits">
      資料來源感謝：
      <a href="https://github.com/Taiwan-Ebook-Lover/TaiwanEbookSearch-API" target="_blank" rel="noopener">Taiwan Ebook Search API</a> /
      <a href="https://github.com/ClarkChiu/kobo_99_notifier" target="_blank" rel="noopener">kobo_99_notifier</a>
      (MIT License)
    </p>
    <p class="footer-copy">
      &copy; 2026 Kaoru Tsai. All Rights Reserved. |
      Contact: <a href="mailto:hello@helloruru.com">hello@helloruru.com</a>
    </p>
  </footer>

  <!-- Dark Mode Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="切換深色模式">
    <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display:none;">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <script>
    // === Config ===
    // 本機開發用相對路徑，部署後改成 Worker URL
    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:8787'
      : 'https://ebook-deals.vmpvmp1017.workers.dev';

    // === Dark Mode ===
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
        document.getElementById('sunIcon').style.display = 'none';
        document.getElementById('moonIcon').style.display = 'block';
      }
    })();

    document.getElementById('themeToggle').addEventListener('click', function() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('sunIcon').style.display = isDark ? 'none' : 'block';
      document.getElementById('moonIcon').style.display = isDark ? 'block' : 'none';
    });

    // === Fetch Deals ===
    async function loadDeals() {
      const container = document.getElementById('dealsContainer');

      try {
        const res = await fetch(API_BASE + '/api/deals');
        if (!res.ok) throw new Error('API 回應異常');
        const data = await res.json();

        // 更新時間
        if (data.updatedAt) {
          const d = new Date(data.updatedAt);
          document.getElementById('updateTime').textContent =
            `最後更新：${d.toLocaleDateString('zh-TW')} ${d.toLocaleTimeString('zh-TW')}`;
        }

        const allDeals = [];
        const futureDeals = [];

        // Readmoo
        if (data.readmoo?.deals) {
          const today = new Date().toISOString().split('T')[0];
          for (const deal of data.readmoo.deals) {
            if (deal.date === today || data.readmoo.deals.indexOf(deal) === 0) {
              allDeals.push(deal);
            } else {
              futureDeals.push(deal);
            }
          }
        }

        // 博客來
        if (data.books?.deals) {
          allDeals.push(...data.books.deals);
        }

        // Kobo
        if (data.kobo?.deals) {
          allDeals.push(...data.kobo.deals.slice(0, 1)); // 只取今天的
        }

        if (allDeals.length === 0) {
          container.innerHTML = '<div class="error-msg">目前沒有抓到特價資料，請稍後再試</div>';
          return;
        }

        container.innerHTML = allDeals.map(deal => renderDealCard(deal)).join('');

        // Readmoo 未來預覽
        if (futureDeals.length > 0) {
          document.getElementById('futureDealSection').style.display = 'block';
          document.getElementById('futureDealsGrid').innerHTML =
            futureDeals.map(deal => renderFutureCard(deal)).join('');
        }

      } catch (err) {
        container.innerHTML = `<div class="error-msg">載入失敗：${err.message}<br>請重新整理頁面試試</div>`;
      }
    }

    // 每張卡片的 unique id（用於評分載入後更新）
    let cardIdCounter = 0;

    function renderDealCard(deal) {
      const platform = deal.platform;
      const platformName = deal.platformName || platform;
      const dealType = deal.dealType || '每日特惠';
      const discount = deal.originalPrice > 0
        ? Math.round((deal.dealPrice / deal.originalPrice) * 100) / 10
        : 0;
      const cardId = 'deal-rec-' + (cardIdCounter++);

      const coverHtml = deal.coverUrl
        ? `<img class="book-cover" src="${escapeHtml(deal.coverUrl)}" alt="${escapeHtml(deal.title)}" loading="lazy" onerror="this.outerHTML='<div class=\\'book-cover-placeholder\\'>${escapeHtml(platformName)}</div>'">`
        : `<div class="book-cover-placeholder">${escapeHtml(platformName)}</div>`;

      // 非同步載入評分
      loadRating(deal, cardId);

      return `
        <div class="deal-card">
          <div class="card-header">
            <span class="platform-badge ${platform}">${escapeHtml(platformName)}</span>
            <span class="deal-type-tag">${escapeHtml(dealType)}</span>
          </div>
          <div class="card-body">
            ${coverHtml}
            <div class="book-info">
              <div class="book-title">${escapeHtml(deal.title)}</div>
              ${deal.author ? `<div class="book-author">${escapeHtml(deal.author)}</div>` : ''}
              ${deal.publisher ? `<div class="book-publisher">${escapeHtml(deal.publisher)}</div>` : ''}
              <div class="price-row">
                <span class="price-deal">$${deal.dealPrice}</span>
                ${deal.originalPrice > 0 ? `<span class="price-original">$${deal.originalPrice}</span>` : ''}
                ${discount > 0 ? `<span class="price-discount">${discount}折</span>` : ''}
              </div>
            </div>
          </div>
          <div class="recommendation" id="${cardId}">
            <div class="rec-loading">讀取評價中...</div>
          </div>
          <div class="card-footer">
            <a href="${escapeHtml(deal.bookUrl)}" target="_blank" rel="noopener" class="buy-btn ${platform}">
              前往 ${escapeHtml(platformName)} 購買
            </a>
          </div>
        </div>
      `;
    }

    // 非同步載入單本書的評分及入手建議
    async function loadRating(deal, cardId) {
      try {
        const params = new URLSearchParams({
          title: deal.title,
          author: deal.author || '',
          dealPrice: deal.dealPrice,
          originalPrice: deal.originalPrice || 0,
        });
        const res = await fetch(API_BASE + '/api/rating?' + params);
        if (!res.ok) throw new Error('API error');
        const data = await res.json();

        const el = document.getElementById(cardId);
        if (!el) return;

        const rec = data.recommendation;
        const rating = data.rating;

        // 星星顯示
        let starsHtml = '';
        if (rating) {
          const fullStars = Math.floor(rating.rating);
          const halfStar = rating.rating % 1 >= 0.5;
          let stars = '';
          for (let i = 0; i < fullStars; i++) stars += '\u2605';
          if (halfStar) stars += '\u2606';
          starsHtml = `
            <div class="rec-rating">
              <span class="rec-stars">${stars}</span>
              <span class="rec-rating-text">${rating.rating} / 5（${rating.ratingsCount} 則評價，${rating.source}）</span>
            </div>
          `;
        }

        el.style.borderLeftColor = rec.color;
        el.innerHTML = `
          <div class="rec-header">
            <span class="rec-label" style="background:${rec.color};">${escapeHtml(rec.label)}</span>
            <span class="rec-stats">${escapeHtml(rec.stats)}</span>
          </div>
          <div class="rec-copy">${escapeHtml(rec.copy)}</div>
          ${starsHtml}
        `;
      } catch {
        const el = document.getElementById(cardId);
        if (el) el.innerHTML = '';
      }
    }

    function renderFutureCard(deal) {
      const dateObj = new Date(deal.date + 'T00:00:00+08:00');
      const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
      const dateStr = `${dateObj.getMonth() + 1}/${dateObj.getDate()} (${weekdays[dateObj.getDay()]})`;

      return `
        <a href="${escapeHtml(deal.bookUrl)}" target="_blank" rel="noopener" class="future-card" style="text-decoration:none;color:inherit;">
          <div class="future-date">${dateStr}</div>
          ${deal.coverUrl
            ? `<img class="future-cover" src="${escapeHtml(deal.coverUrl)}" alt="${escapeHtml(deal.title)}" loading="lazy">`
            : `<div class="future-cover" style="background:var(--color-gradient);"></div>`
          }
          <div class="future-title">${escapeHtml(deal.title)}</div>
          <div class="future-price">$${deal.dealPrice}</div>
        </a>
      `;
    }

    // === Search ===
    async function doSearch() {
      const input = document.getElementById('searchInput');
      const btn = document.getElementById('searchBtn');
      const resultsDiv = document.getElementById('searchResults');
      const query = input.value.trim();

      if (query.length < 2) {
        alert('請輸入至少 2 個字');
        return;
      }

      btn.disabled = true;
      btn.textContent = '搜尋中...';
      resultsDiv.classList.add('active');
      resultsDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>正在搜尋各平台...</p></div>';

      try {
        const res = await fetch(API_BASE + '/api/search?q=' + encodeURIComponent(query));
        if (!res.ok) throw new Error('搜尋 API 錯誤');
        const data = await res.json();

        if (!data.success) {
          resultsDiv.innerHTML = `<div class="error-msg">${escapeHtml(data.error || '搜尋失敗')}</div>`;
          return;
        }

        const { readmoo = [], books = [], kobo = [] } = data.results;

        if (readmoo.length === 0 && books.length === 0 && kobo.length === 0) {
          resultsDiv.innerHTML = '<div class="no-results">沒有找到相關電子書</div>';
          return;
        }

        resultsDiv.innerHTML = `
          <div class="results-grid">
            <div class="result-column">
              <h3 style="color:var(--readmoo-color);">Readmoo 讀墨 (${readmoo.length})</h3>
              ${readmoo.length > 0
                ? readmoo.map(r => renderResultItem(r)).join('')
                : '<div class="no-results">無結果</div>'
              }
            </div>
            <div class="result-column">
              <h3 style="color:var(--books-color);">博客來 (${books.length})</h3>
              ${books.length > 0
                ? books.map(r => renderResultItem(r)).join('')
                : '<div class="no-results">無結果</div>'
              }
            </div>
            <div class="result-column">
              <h3 style="color:var(--kobo-color);">Kobo (${kobo.length})</h3>
              ${kobo.length > 0
                ? kobo.map(r => renderResultItem(r)).join('')
                : '<div class="no-results">無結果</div>'
              }
            </div>
          </div>
        `;
      } catch (err) {
        resultsDiv.innerHTML = `<div class="error-msg">搜尋失敗：${escapeHtml(err.message)}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '搜尋比價';
      }
    }

    function renderResultItem(item) {
      return `
        <div class="result-item">
          <div class="result-title">${escapeHtml(item.title)}</div>
          ${item.price > 0 ? `<div class="result-price">$${item.price}</div>` : ''}
          ${item.bookUrl ? `<a href="${escapeHtml(item.bookUrl)}" target="_blank" rel="noopener" class="result-link">前往購買 &rarr;</a>` : ''}
        </div>
      `;
    }

    // === Enter 搜尋 ===
    document.getElementById('searchInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });

    // === Utility ===
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // === Init ===
    loadDeals();
  </script>

</body>
</html>
